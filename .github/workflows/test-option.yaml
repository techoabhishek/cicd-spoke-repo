name: Manual Pipeline with Options

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - sandbox
      
      log_level:
        description: 'Set the logging verbosity'
        required: false
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warn
          - error

      run_tests:
        description: 'Run unit tests before deployment?'
        required: true
        default: true
        type: boolean

      version_tag:
        description: 'Enter the version tag (e.g., v1.0.1)'
        required: false
        default: 'latest'
        type: string

jobs:
  test-options:
    runs-on: ubuntu-latest
    steps:
      - name: Show Selected Values
        run: |
          echo "Selected Environment: ${{ github.event.inputs.environment }}"
          echo "Log Level: ${{ github.event.inputs.log_level }}"
          echo "Run Tests: ${{ github.event.inputs.run_tests }}"
          echo "Version Tag: ${{ github.event.inputs.version_tag }}"

      - name: Conditional Step Example
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: echo "Executing unit tests..."