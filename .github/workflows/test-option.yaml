name: Manual Pipeline with Options

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - sandbox
      golden_number:
        description: 'Enter a golden number'
        required: true
        default: 'A1'
        type: choice
        options:
          - A1
          - A2
          - A3
          - A4
          - A5
          - A6
          - A7
          - A8
          - A9
          - A10
          - A11
          - A12
          - A13
          - A14
          - A15
          - A16
          - A17
          - A18
          - A19
          - A20
          - A21
          - A22
          - A23
          - A24
          - A25
          - A26
          - A27
          - A28
          - A29
          - A30
          - A31
          - A32
          - A33
          - A34
          - A35
          - A36
          - A37
          - A38
          - A39
          - A40
          - A41
          - A42
          - A43
          - A44
          - A45
          - A46
          - A47
          - A48
          - A49
          - A50

      

jobs:
  test-options:
    runs-on: ubuntu-latest
    steps:
      - name: Show Selected Values
        run: |
          echo "Selected Environment: ${{ github.event.inputs.environment }}"
