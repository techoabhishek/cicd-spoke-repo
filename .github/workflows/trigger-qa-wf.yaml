name: Trigger QA Workflow

on:
  pull_request:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger QA repo workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: techoabhishek/cicd-hub-repo
          event-type: run-qa-tests
          client_payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }