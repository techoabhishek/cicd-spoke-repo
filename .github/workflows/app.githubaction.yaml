name: Spoke CI - Build & Deploy sample-node-app to Cloud Run
on:
  pull_request:
    branches: 
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
env:
  SLACK_REPO_OWNER: "@U0APMALNPPY"
jobs:

  pr-check:

    # Only run if this is a PR event
    if: github.event_name == 'pull_request'
    uses: techoabhishek/cicd-hub-repo/.github/workflows/nodejs-ci.yaml@main
    
    with:
      service_dir: .
    secrets: inherit

  setup:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.env.outputs.env_name }}
      notify_status: ${{ steps.env.outputs.notify_status }}
    steps:
      - id: env
        run: |
          # Map Branch -> Environment
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
            echo "notify_status=approval" >> $GITHUB_OUTPUT
          elif [[ ${{ github.ref }} == 'refs/heads/develop' ]]; then
            echo "env_name=staging" >> $GITHUB_OUTPUT
            echo "notify_status=skip" >> $GITHUB_OUTPUT
          fi
          echo "Setup complete for environment: ${{ steps.env.outputs.env_name }}"
  notify-deploy:
    needs: [setup]
    if: github.event_name == 'push' && needs.setup.outputs.notify_status != 'skip'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Request Approval via Slack
        uses: techoabhishek/cicd-hub-repo/.github/actions/slack-notify@main
        with:
          status: ${{ needs.setup.outputs.notify_status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          job_name: "Deploying to ${{ needs.setup.outputs.env_name }}"
          mention_on_failure: ${{ env.SLACK_REPO_OWNER }}  # Slack User ID to mention for approval
  
  call-hub-deploy:
    needs: [setup, notify-deploy]
    if: |
      always() && 
      needs.setup.result == 'success' && 
      (needs.notify-deploy.result == 'success' || needs.notify-deploy.result == 'skipped')
    permissions:
      contents: read
      id-token: write
    uses: techoabhishek/cicd-hub-repo/.github/workflows/nodejs-cloudrun-deploy.yaml@main

    with:
      environment: ${{ needs.setup.outputs.env_name }}
      service_dir: .
      project_id: prj-vonage-apigee-poc
      region: us-central1
      image_repo: cicd-hub-spoke # Artifact Registry repo name
      service_name: sample-node-app-gh-cicd
    secrets: inherit
  
  create-release:
    needs: [setup, call-hub-deploy]
    if: |
        success() &&
        (needs.setup.outputs.env_name == 'production' || needs.setup.outputs.env_name == 'staging')
    permissions:
      contents: write
      pull-requests: read
    with:
      environment: ${{ needs.setup.outputs.env_name }}
    uses: techoabhishek/cicd-hub-repo/.github/workflows/generate-releases.yaml@main
    secrets: inherit
  
  # 👇 NEW: SEND THE FINAL RELEASE NOTES
  notify-release-notes:
    needs: [setup, create-release]
    # Only run if release creation was successful
    if: success() && (needs.setup.outputs.env_name == 'production' || needs.setup.outputs.env_name == 'staging')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Send Release Notes
        uses: techoabhishek/cicd-hub-repo/.github/actions/slack-notify@main
        with:
          status: 'success'
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          mode: 'release'
          title: ' Release'
          job_name: "${{ needs.setup.outputs.env_name }} v1.0.0" # You can pass dynamic tag here later
          
          # 👇 These are the Spoke-specific details
          instance_name: 'EU & US' 
          function_name: 'Backend'
          cm_ticket: 'VCJAT-2' # The test Jira ticket you provided
          services: 'Broadcast Core Service'
          
          # 👇 This is where the PR commit bodies will go. For testing, we mock the ticket.
          custom_text: |
                • <https://techolution.atlassian.net/browse/VCJAT-2|VCJAT-2>: Slack Release Note Test